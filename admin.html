<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
margin:0;
background:#111;
font-family:Arial,sans-serif;
color:white;
}

.header{
background:#ff9800;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.card{
width:90%;
max-width:400px;
margin:20px auto;
background:#222;
padding:20px;
border-radius:15px;
text-align:center;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:10px;
font-size:18px;
box-sizing:border-box;
}

button,.btn{
width:100%;
padding:15px;
margin-top:10px;
background:#ff9800;
color:white;
border:none;
border-radius:10px;
font-size:18px;
text-decoration:none;
display:block;
box-sizing:border-box;
}

.balance{
font-size:40px;
color:#00ff33;
margin:20px 0;
}
</style>

</head>
<body>

<div class="header">
👨‍💼 Admin Panel
</div>

<div class="card">

<h2>Current Balance</h2>

<div class="balance" id="balance">₹0</div>

<input type="number" id="newBalance" placeholder="Enter New Balance">

<button onclick="updateBalance()">Update Balance</button>

<a class="btn" href="wallet.html">💰 Back Wallet</a>

</div>

<script>
function showBalance(){
let balance = localStorage.getItem("balance") || "0";
document.getElementById("balance").innerHTML = "₹" + balance;
}

function updateBalance(){
let amount = document.getElementById("newBalance").value;

if(amount==""){
alert("Enter Balance");
return;
}

localStorage.setItem("balance", amount);

alert("Balance Updated");

showBalance();
}

showBalance();
</script>

</body>
<script>
<script>
let pass = prompt("Enter Admin Password");

if(pass !== "VIPIN@123"){
    alert("Wrong Password");
    window.location.href = "index.html";
}
</script>
</html>
