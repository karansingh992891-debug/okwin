<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction History</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:white;
}

.header{
background:#00c853;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.card{
width:90%;
max-width:450px;
margin:20px auto;
background:#222;
padding:20px;
border-radius:15px;
}

.item{
background:#333;
padding:15px;
margin:10px 0;
border-radius:10px;
font-size:18px;
}

.btn{
display:block;
background:#00c853;
color:white;
text-decoration:none;
padding:15px;
text-align:center;
border-radius:10px;
margin-top:20px;
}
</style>

</head>
<body>

<div class="header">
📜 Transaction History
</div>

<div class="card">

<div id="history"></div>

<a class="btn" href="wallet.html">⬅ Back Wallet</a>

</div>

<script>

let history = JSON.parse(localStorage.getItem("history")) || [];

let output = "";

if(history.length == 0){

output = "<div class='item'>No Transactions Found</div>";

}else{

history.reverse().forEach(function(item){

output += "<div class='item'>" + item + "</div>";

});

}

document.getElementById("history").innerHTML = output;

</script>

</body>
</html>
